<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1224"/>
      <stop offset="60%" stop-color="#0b1224"/>
      <stop offset="100%" stop-color="#1a2542"/>
    </linearGradient>
    <linearGradient id="pin" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="55%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.5">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#38bdf8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <circle cx="256" cy="240" r="200" fill="url(#glow)"/>

  <!-- Pulse rings -->
  <circle cx="256" cy="220" r="148" fill="none" stroke="#38bdf8" stroke-opacity="0.18" stroke-width="3"/>
  <circle cx="256" cy="220" r="186" fill="none" stroke="#38bdf8" stroke-opacity="0.1" stroke-width="3"/>

  <!-- Pin shape -->
  <g filter="url(#softShadow)">
    <path d="M256 92 C176 92 122 152 122 224 C122 318 256 444 256 444 C256 444 390 318 390 224 C390 152 336 92 256 92 Z" fill="url(#pin)"/>
    <circle cx="256" cy="220" r="48" fill="#0b1224"/>
    <circle cx="256" cy="220" r="22" fill="#7dd3fc"/>
    <circle cx="256" cy="220" r="22" fill="none" stroke="#e0f2fe" stroke-opacity="0.5" stroke-width="2"/>
  </g>
</svg>
