    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "GeoPulse",
      "url": "https://geopulse.app/tool/location-finder",
      "description": "Premium, privacy-focused real-time geolocation tool with reverse geocoding and interactive OpenStreetMap.",
      "applicationCategory": "UtilitiesApplication",
      "applicationSubCategory": "Maps",
      "operatingSystem": "Web",
      "browserRequirements": "Requires a browser with the Geolocation API.",
      "isAccessibleForFree": true,
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "featureList": [
        "Real-time location tracking",
        "Reverse geocoding (city and country)",
        "Manual coordinate input",
        "Interactive OpenStreetMap view",
        "Privacy-focused — runs fully in browser",
        "Free to use, no signup",
        "Mobile-responsive design"
      ]
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        { "@type": "Question", "name": "How does GeoPulse find my location?", "acceptedAnswer": { "@type": "Answer", "text": "GeoPulse uses your browser's Geolocation API combined with reverse geocoding via OpenStreetMap Nominatim. All requests run from your browser." } },
        { "@type": "Question", "name": "Is GeoPulse free?", "acceptedAnswer": { "@type": "Answer", "text": "Yes. GeoPulse is 100% free, no signup, no ads, and uses open-source OpenStreetMap data." } },
        { "@type": "Question", "name": "Does GeoPulse store my location?", "acceptedAnswer": { "@type": "Answer", "text": "No. There is no backend. Your coordinates and addresses are never stored or shared." } }
      ]
    }
    </script>
